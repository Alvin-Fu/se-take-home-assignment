name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
      - name: Build
        run: ./build.sh
      - name: Test
        run: ./test.sh
      - name: Smoke run (scripted, 200ms cook time)
        run: |
          printf 'n\nv\nn\n+bot\n+bot\nstatus\n' | ./bin/orderbot --cook 200ms
          echo "--- result.txt ---"
          cat result.txt
